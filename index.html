<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spidey HUD Connection</title>
    <style>
        body { background-color: #000; color: #1DB954; font-family: monospace; text-align: center; padding-top: 50px; }
        .spinner { margin: 20px auto; width: 40px; height: 40px; border: 4px solid rgba(29, 185, 84, 0.3); border-radius: 50%; border-top-color: #1DB954; animation: spin 1s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <h2 id="status">CONNECTING TO HUD...</h2>
    <div id="loading" class="spinner"></div>
    <p id="msg">Initializing secure handshake.</p>

    <script>
        const clientId = '1125aef5fc29462098e46e96ba3cb79f'; 
        const redirectUri = 'https://diveshpv.github.io/spidey-hud-bridge/';
        
        // These scopes MUST be approved on the Spotify screen
        const scope = 'user-read-currently-playing user-modify-playback-state user-library-read playlist-read-private playlist-read-collaborative';
        
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const ip = params.get('ip') || window.location.hash.substring(1);

        if (ip) {
            sessionStorage.setItem('espIp', ip);
            document.getElementById('msg').innerText = "Redirecting to Spotify securely...";
            
            // THE FIX: Using the official URL and adding '&show_dialog=true' to force the permission screen
            const authUrl = "https://accounts.spotify.com/authorize?client_id=" + clientId + 
                            "&response_type=code&redirect_uri=" + encodeURIComponent(redirectUri) + 
                            "&scope=" + encodeURIComponent(scope) + "&show_dialog=true";
            window.location.href = authUrl;
        } 
        else if (code) {
            const savedIp = sessionStorage.getItem('espIp');
            if (savedIp) {
                document.getElementById('status').innerText = "AUTHENTICATED";
                document.getElementById('msg').innerText = "Transferring keys to your Spidey HUD...";
                window.location.href = "http://" + savedIp + "/callback?code=" + code;
            } else {
                document.getElementById('status').innerText = "SESSION LOST";
                document.getElementById('msg').innerText = "Please scan the QR code on your HUD again.";
                document.getElementById('loading').style.display = 'none';
            }
        } 
        else {
            document.getElementById('status').innerText = "AWAITING DEVICE";
            document.getElementById('msg').innerText = "Please scan the QR code on your Spidey HUD screen to begin.";
            document.getElementById('loading').style.display = 'none';
        }
    </script>
</body>
</html>
