<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spidey Auth</title>
</head>
<body style="background:#000; color:#1DB954; font-family:monospace; text-align:center; padding-top:50px;">
    <h2 id="status">CONNECTING...</h2>

    <script>
        const clientId = '1125aef5fc29462098e46e96ba3cb79f'; 
        const redirectUri = 'https://diveshpv.github.io/spidey-hud-bridge/';
        const scope = 'user-read-currently-playing user-modify-playback-state user-library-read playlist-read-private playlist-read-collaborative';
        
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const ip = params.get('ip');

        // Flow 1: Scanning the QR code (contains IP)
        if (ip) {
            sessionStorage.setItem('espIp', ip);
            window.location.href = "https://accounts.spotify.com/authorize?client_id=" + clientId + 
                                   "&response_type=code&redirect_uri=" + encodeURIComponent(redirectUri) + 
                                   "&scope=" + encodeURIComponent(scope);
        } 
        // Flow 2: Returned from Spotify (contains Code)
        else if (code) {
            const savedIp = sessionStorage.getItem('espIp');
            if (savedIp) {
                // Seamless redirect back to the ESP32
                window.location.href = "http://" + savedIp + "/callback?code=" + code;
            } else {
                document.getElementById('status').innerText = "ERROR: Scan the QR code on the screen again.";
            }
        }
    </script>
</body>
</html>
