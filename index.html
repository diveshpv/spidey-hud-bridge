<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spidey HUD Auth</title>
</head>
<body style="background:#000; color:#1DB954; font-family:monospace; text-align:center; padding-top:50px;">
    <h2>HUD AUTHORIZED!</h2>
    <p>Transferring keys to Spidey HUD... Please wait.</p>

    <script>
        const authCode = new URLSearchParams(window.location.search).get('code');
        if (authCode) {
            // Instantly bounces the browser back to the HUD over the local network
            window.location.replace(`http://spidey.local/callback?code=${authCode}`);
        } else {
            document.body.innerHTML = "<h2 style='color:red;'>ERROR: No code received.</h2>";
        }
    </script>
</body>
</html>
