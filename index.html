<script>
    const urlParams = new URLSearchParams(window.location.search);
    const authCode = urlParams.get('code');
    
    // Check if we have a code from Spotify
    if (authCode) {
        // Retrieve the IP the user manually entered or use the current origin
        const ip = prompt("Enter your ESP32 IP Address (found in Serial Monitor):");
        if (ip) {
            window.location.href = `http://${ip}/callback?code=${authCode}`;
        }
    } else {
        // No code? Restart the auth flow
        const clientId = '1125aef5fc29462098e46e96ba3cb79f';
        const authUrl = `https://accounts.spotify.com/authorize?client_id=${clientId}&response_type=code&redirect_uri=https://diveshpv.github.io/spidey-hud-bridge/&scope=user-read-currently-playing%20user-modify-playback-state%20playlist-read-private%20user-library-read`;
        window.location.href = authUrl;
    }
</script>
